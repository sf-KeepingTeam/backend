name: Deploy MSA to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ──────────────────────────────────────────
  # 1. Monolith 빌드 & 배포 (EC2-1)
  # ──────────────────────────────────────────
  deploy-monolith:
    name: Monolith — Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle        # Gradle 캐시 — 반복 빌드 시 2~3분 단축

      - name: Grant execute permission
        run: chmod +x monolith/gradlew

      - name: Build Monolith JAR
        working-directory: monolith
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Monolith Image
        uses: docker/build-push-action@v5
        with:
          context: ./monolith
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/keeping-monolith:latest
            ${{ secrets.DOCKER_USERNAME }}/keeping-monolith:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 — Monolith
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_MAIN }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /opt/keeping

            # 최신 이미지 pull
            docker compose pull monolith

            # monolith만 재기동 (DB/Redis 유지)
            docker compose up -d --no-deps monolith

            # 오래된 이미지 정리
            docker image prune -f

            # 헬스체크 대기 (최대 90초)
            echo "⏳ Monolith 기동 대기..."
            for i in $(seq 1 9); do
              sleep 10
              STATUS=$(curl -sf http://localhost:8080/actuator/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "DOWN")
              echo "[$i] status=$STATUS"
              if [ "$STATUS" = "UP" ]; then
                echo "✅ Monolith 정상 기동"
                exit 0
              fi
            done
            echo "❌ Monolith 헬스체크 실패"
            docker compose logs --tail=50 monolith
            exit 1

  # ──────────────────────────────────────────
  # 2. QR Service 빌드 & 배포 (EC2-2)
  # ──────────────────────────────────────────
  deploy-qr-service:
    name: QR Service — Build & Deploy
    runs-on: ubuntu-latest
    needs: [deploy-monolith]   # qr-service 캐시 워밍이 monolith /internal/stores/all을 호출하므로
                                # monolith가 먼저 UP 된 후 qr-service를 기동해야 함

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x qr-service/gradlew

      - name: Build QR Service JAR
        working-directory: qr-service
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push QR Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./qr-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/keeping-qr-service:latest
            ${{ secrets.DOCKER_USERNAME }}/keeping-qr-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 — QR Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_QR }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /opt/keeping

            docker compose pull qr-service
            docker compose up -d --no-deps qr-service
            docker image prune -f

            echo "⏳ QR Service 기동 대기..."
            for i in $(seq 1 9); do
              sleep 10
              STATUS=$(curl -sf http://localhost:8081/actuator/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "DOWN")
              echo "[$i] status=$STATUS"
              if [ "$STATUS" = "UP" ]; then
                echo "✅ QR Service 정상 기동"
                exit 0
              fi
            done
            echo "❌ QR Service 헬스체크 실패"
            docker compose logs --tail=50 qr-service
            exit 1
