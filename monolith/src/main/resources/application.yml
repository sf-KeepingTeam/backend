server:
  port: 8080

spring:
  application:
    name: monolith  # Tracing 로그에 표시될 서비스명

  profiles:
    active: local  # 기본 프로필: local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

app:
  auth:
    jwt:
      issuer: kakao-oauth2-jwt
      access-ttl-seconds: 900   # 15분
      refresh-ttl-seconds: 1209600 # 14일 (14 * 24 * 60 * 60)
      cookie-name: ACCESS_TOKEN
      cookie-secure: false      # 로컬은 false, 운영(HTTPS)은 true
      cookie-same-site: Lax
    redirect-path: /auth/callback


# NOTE: 아래 management / logging.pattern 블록은 qr-service/src/main/resources/application.yml 와
#       수동 동기화 대상. 한쪽만 수정하지 말 것. (독립 Gradle 프로젝트라 YAML 공유 불가)
# Actuator + Tracing (분산 추적)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0  # 100% 샘플링 (개발용, 운영에서는 0.1 권장)
    enabled: true
  zipkin:
    tracing:
      enabled: false  # Zipkin 서버 없이 로그 기반 추적

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.ssafy.keeping: DEBUG

# 결제 설정 (토스페이먼츠)
payment:
  provider: toss  # 기본 결제 제공자 (toss, kakao, naver 등)
  toss:
    secret-key: ${TOSS_SECRET_KEY:test_sk_Gv6LjeKD8aBnMEWAZA0Y3wYxAdXy}  # 테스트 시크릿 키
    base-url: https://api.tosspayments.com
    connect-timeout: 5000
    read-timeout: 10000

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
    region:
      static: ${AWS_REGION:ap-southeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:aws-bucket-keeping-509}

fcm:
  service-account-file: classpath:firebase/keeping-firebase-adminsdk.json
  project-id: "keeping-6130e"

