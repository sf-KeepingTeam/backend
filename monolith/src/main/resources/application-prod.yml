# 배포 서버 환경 설정 (Docker Compose)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/ssafy_fintech_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

app:
  auth:
    jwt:
      secret: ${JWT_SECRET:NbPg+8/rCm9yW15pYbbOTXdg1QTPqDcRMA8oauseuOqzrAdkLMcXfmbMLkqt3tZ5HecMd5bnCscx4Iuo2EjnJA==}
    refresh-cookie:
      name: REFRESH_TOKEN
      same-site: Lax
      secure: true
      domain: ""
      path: /auth

# 내부 서비스 통신 토큰
internal:
  auth-token: ${INTERNAL_AUTH_TOKEN:internal-service-token-12345}

fe:
  base-url: ${FE_BASE_URL:http://localhost:3030}

# QR Service 연동 설정
qr-service:
  url: ${QR_SERVICE_URL:http://qr-service:8082}
  webhook:
    enabled: ${QR_WEBHOOK_ENABLED:true}

# Actuator: base(application.yml) 의 management 블록 상속. prod 에서는 트레이스 샘플링만 낮춘다.
management:
  tracing:
    sampling:
      probability: 0.1   # prod: 10% (base 는 1.0 - 개발용)
