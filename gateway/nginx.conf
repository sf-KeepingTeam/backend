events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ========================================
    # Rate Limiting zone 정의
    # ========================================
    limit_req_zone $binary_remote_addr zone=qr_api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general_api:10m rate=100r/s;

    # ========================================
    # Proxy 타임아웃 기본값
    # Nginx proxy_read_timeout > Spring 처리 > DB 락(3s)
    # ========================================
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # 백엔드 서버 그룹
    upstream monolith {
        server monolith:8080;
    }

    upstream qr-service {
        server 43.200.60.138:8081;
    }

    server {
        listen 80;
        server_name localhost;

        # ========================================
        # 내부 API 외부 접근 차단
        # ========================================
        location /internal {
            default_type application/json;
            return 403 '{"error": "Forbidden", "message": "Internal API access denied"}';
        }

        # ========================================
        # 인증 불필요한 경로
        # ========================================

        # Nginx 헬스체크
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        location /auth/refresh {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location /auth/logout {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        location /oauth2 {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /login/oauth2 {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # LoadTest API (테스트용)
        location /api/loadtest {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-LoadTest-Auth $http_x_loadtest_auth;
        }

        # ========================================
        # QR Service (JWT 직접 검증)
        # Rate Limit: 30r/s per IP, burst 50
        # ========================================

        # QR 토큰 API → QR Service
        location /api/qr {
            limit_req zone=qr_api burst=50 nodelay;

            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # CPQR 결제 의도 생성 → QR Service (점주용)
        location ~ ^/cpqr/([^/]+)/initiate$ {
            limit_req zone=qr_api burst=50 nodelay;

            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 결제 승인 → QR Service (고객용)
        location ~ ^/payments/([^/]+)/approve$ {
            limit_req zone=qr_api burst=50 nodelay;

            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Idempotency-Key $http_idempotency_key;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # 결제 의도 상세 조회 → QR Service
        location ~ ^/api/payments/intent/([^/]+)$ {
            limit_req zone=qr_api burst=50 nodelay;

            proxy_pass http://qr-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ========================================
        # Monolith API (JWT 직접 검증)
        # Rate Limit: 100r/s per IP, burst 200
        # ========================================
        location /api {
            limit_req zone=general_api burst=200 nodelay;

            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # ========================================
        # 기타 (인증 불필요)
        # ========================================
        location / {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
